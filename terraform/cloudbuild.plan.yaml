steps:
  - id: fetch-tfvars
    name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: bash
    args: ['-c', 'gcloud secrets versions access latest --secret=monsoon-${_ENV}-tfvars > terraform/environments/${_ENV}/terraform.tfvars.json']
  - id: tofu-plan
    name: ghcr.io/opentofu/opentofu:1.8
    dir: terraform/environments/${_ENV}
    entrypoint: sh
    args:
      - -c
      - |
        set -e
        tofu init -input=false -backend-config="bucket=${_TF_STATE_BUCKET}"
        tofu plan -input=false -lock=false -var-file=terraform.tfvars.json
timeout: 1200s
options:
  logging: CLOUD_LOGGING_ONLY