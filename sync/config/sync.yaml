version: 1

drive:
  root: "/India_operational_data_2026/{cluster}"

inventory:
  path: "sync/state/drive_inventory_{cluster}.sqlite3"

rules:
  - name: AIFS
    kind: files
    local_root: "AIFS/output"
    drive_path: "{drive_root}/{date}/AIFS"
    date_regex: "\\d{8}T\\d{2}"
    patterns:
      - "tp/tp_{date}.nc"
      - "sji/sji_{date}.nc"
      - "tcw/tcw_{date}.nc"

  - name: NeuralGCM
    kind: files
    local_root: "NeuralGCM/output"
    drive_path: "{drive_root}/{date}/NeuralGCM"
    date_regex: "\\d{8}T\\d{2}"
    patterns:
      - "tp/tp_{date}.nc"
      - "sji/sji_{date}.nc"
      - "tcw/tcw_{date}.nc"

  - name: blend
    kind: dated_directory
    local_root: "blend/output"
    drive_path: "{drive_root}/{date}/blend"
    date_regex: "\\d{8}T\\d{2}"

  - name: blend_google
    kind: dated_directory
    local_root: "blend/output_google"
    drive_path: "{drive_root}/{date}/blend_google"
    date_regex: "\\d{8}T\\d{2}"

  - name: IMERG
    kind: dated_directory
    local_root: "IMERG/output"
    drive_path: "{drive_root}/{date}/IMERG"
    date_regex: "\\d{8}"

  - name: S2S
    kind: dated_directory
    local_root: "S2S/output"
    drive_path: "{drive_root}/S2S/{date}"
    date_regex: "\\d{8}T\\d{2}"

  - name: IMD
    kind: files
    local_root: "IMD/output"
    drive_path: "{drive_root}/imd-bulletins/IMD_AllIndiaWeatherBulletins"
    date_regex: "\\d{8}"
    patterns:
      - "AIWFB_{date}.pdf"
