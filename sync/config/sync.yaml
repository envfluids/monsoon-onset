version: 1

inventory:
  path: "sync/state/drive_inventory_{region}_{cluster}.sqlite3"

regions:
  india:
    drive:
      root: "/MO_operational_data_2026/{cluster}"
    rules:
      - name: AIFS_single_v1p1
        kind: files
        gcs_prefix: "output/aifs/{date}/"
        gcs_stage_dir: "AIFS/output/india"
        local_root: "AIFS/output/india/AIFS_single_v1p1"
        drive_path: "{drive_root}/{date}/AIFS_single_v1p1"
        date_regex: "\\d{8}T\\d{2}"
        patterns:
          - "tp/tp_2p0_{date}.nc"
          - "tp/tp_0p25_{date}.nc"
          - "sji/sji_{date}.nc"
          - "tcw/tcw_{date}.nc"

      - name: AIFS_single_v2
        kind: files
        gcs_prefix: "output/AIFS_single_v2/{date}/"
        gcs_stage_dir: "AIFS/output/india"
        local_root: "AIFS/output/india/AIFS_single_v2"
        drive_path: "{drive_root}/{date}/AIFS_single_v2"
        date_regex: "\\d{8}T\\d{2}"
        patterns:
          - "tp/tp_2p0_{date}.nc"
          - "tp/tp_0p25_{date}.nc"
          - "sji/sji_{date}.nc"
          - "tcw/tcw_{date}.nc"

      - name: NeuralGCM
        kind: files
        gcs_prefix: "output/neuralgcm/{date}/"
        local_root: "NeuralGCM/output/india"
        drive_path: "{drive_root}/{date}/NeuralGCM"
        date_regex: "\\d{8}T\\d{2}"
        patterns:
          - "tp/tp_2p0_{date}.nc"
          - "sji/sji_{date}.nc"
          - "tcw/tcw_{date}.nc"

      - name: blend
        kind: dated_directory
        gcs_prefix: "output/blend/{date}/india2026/"
        local_root: "blend/output/india2026"
        drive_path: "{drive_root}/{date}/blend"
        date_regex: "\\d{8}T\\d{2}"

      - name: blend_google
        kind: dated_directory
        gcs_prefix: "output/blend/{date}/"
        gcs_stage_dir: "blend/output_google/{region}/{date}"
        local_root: "blend/output_google/{region}"
        drive_path: "{drive_root}/{date}/blend_google"
        date_regex: "\\d{8}T\\d{2}"

      - name: IMERG
        kind: dated_directory
        local_root: "IMERG/output"
        drive_path: "{drive_root}/{date}/IMERG"
        date_regex: "\\d{8}"

      - name: S2S
        kind: dated_directory
        local_root: "S2S/output/india"
        drive_path: "{drive_root}/{date}/S2S"
        date_regex: "\\d{8}T\\d{2}"

      - name: model_diagnostics
        kind: dated_directory
        gcs_prefix: "output/model_diagnostics/{date}/india/"
        local_root: "model_diagnostics/output/india"
        drive_path: "{drive_root}/{date}/model_diagnostics"
        date_regex: "\\d{8}T\\d{2}"

      - name: IMD
        kind: files
        local_root: "IMD/output"
        drive_path: "{drive_root}/imd-bulletins"
        date_regex: "\\d{8}"
        patterns:
          - "AIWFB_{date}.pdf"

  ethiopia:
    drive:
      root: "/operational_data_ethiopia/{cluster}"
    rules:
      - name: AIFS_single_v1p1
        kind: files
        gcs_prefix: "output/aifs/{date}/"
        gcs_date_kind: "aifs_date"
        local_root: "AIFS/output/ethiopia"
        drive_path: "{drive_root}/{date}/AIFS_single_v1p1"
        date_regex: "\\d{8}T\\d{2}"
        ignore_patterns:
          - ".nfs*"
        patterns:
          - "AIFS_single_v1p1/tp/tp_0p25_{date}.nc"

      - name: AIFS_ENS_v1
        kind: files
        gcs_prefix: "output/aifs_ens/{date}/"
        gcs_date_kind: "aifs_date"
        local_root: "AIFS/output/ethiopia"
        drive_path: "{drive_root}/{date}/AIFS_ENS_v1"
        date_regex: "\\d{8}T\\d{2}"
        ignore_patterns:
          - ".nfs*"
        patterns:
          - "AIFS_ENS_v1/tp/tp_0p25_{date}.nc"

      - name: AIFS_single_v2
        kind: files
        gcs_prefix: "output/AIFS_single_v2/{date}/"
        gcs_date_kind: "aifs_date"
        local_root: "AIFS/output/ethiopia"
        drive_path: "{drive_root}/{date}/AIFS_single_v2"
        date_regex: "\\d{8}T\\d{2}"
        ignore_patterns:
          - ".nfs*"
        patterns:
          - "AIFS_single_v2/tp/tp_0p25_{date}.nc"

      - name: AIFS_ENS_v2
        kind: files
        gcs_prefix: "output/AIFS_ENS_v2/{date}/"
        gcs_date_kind: "aifs_date"
        local_root: "AIFS/output/ethiopia"
        drive_path: "{drive_root}/{date}/AIFS_ENS_v2"
        date_regex: "\\d{8}T\\d{2}"
        ignore_patterns:
          - ".nfs*"
        patterns:
          - "AIFS_ENS_v2/tp/tp_0p25_{date}.nc"

      - name: NeuralGCM
        kind: files
        gcs_prefix: "output/neuralgcm/{date}/"
        local_root: "NeuralGCM/output/ethiopia"
        drive_path: "{drive_root}/{date}/NeuralGCM"
        date_regex: "\\d{8}T\\d{2}"
        ignore_patterns:
          - ".nfs*"
        patterns:
          - "tp/tp_2p8_{date}.nc"

      - name: GenCast
        kind: files
        gcs_prefix: "output/gencast/{date}/"
        gcs_date_kind: "aifs_date"
        gcs_stage_dir: "gencast/output/ethiopia/tp"
        local_root: "gencast/output/ethiopia"
        drive_path: "{drive_root}/{date}/GenCast"
        date_regex: "\\d{8}T\\d{2}"
        ignore_patterns:
          - ".nfs*"
        patterns:
          - "init_{date}.nc"
          - "tp/tp_0p25_{date}.nc"

      - name: blend
        kind: dated_directory
        gcs_prefix: "output/blend/{date}/ethiopia2026/"
        gcs_date_kind: "aifs_date"
        local_root: "blend/output/ethiopia2026"
        drive_path: "{drive_root}/{date}/blend"
        date_regex: "\\d{8}T\\d{2}"

      - name: model_diagnostics
        kind: dated_directory
        gcs_prefix: "output/model_diagnostics/{date}/ethiopia/"
        local_root: "model_diagnostics/output/ethiopia"
        drive_path: "{drive_root}/{date}/model_diagnostics"
        date_regex: "\\d{8}T\\d{2}"
