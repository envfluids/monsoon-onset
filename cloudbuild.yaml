# -----------------------------------------------------------------------------
# Cloud Build Configuration
# Builds and pushes Docker images to Artifact Registry.
#
# Only images whose source paths changed (per .image-deps.yaml) are rebuilt.
# Untouched images are skipped — both pull-cache and build/push steps short-
# circuit when their image name is not in /workspace/targets.
#
# Trigger this build with:
#   gcloud builds submit --config cloudbuild.yaml \
#     --substitutions=_SHORT_SHA=$(git rev-parse --short HEAD),_TARGETS=all
#
# Or rely on the push-to-main trigger defined in
# terraform/environments/dev/main.tf.
# -----------------------------------------------------------------------------

substitutions:
  _REGION: us-central1
  _REPO: monsoon-dev-containers
  _ENV: dev
  _SHORT_SHA: local
  # auto  → diff HEAD against _BASE_REF and rebuild what changed
  # all   → rebuild every image
  # comma-list (e.g. pipeline-state,downloader) → rebuild exactly those
  _TARGETS: auto
  _BASE_REF: HEAD~1

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8

steps:
  # ---------------------------------------------------------------------------
  # Resolve which images need rebuilding from the git diff + .image-deps.yaml.
  # Writes the list to /workspace/targets; downstream steps grep it as a gate.
  # ---------------------------------------------------------------------------
  - id: detect-targets
    name: python:3.11
    entrypoint: bash
    env:
      - "TARGETS=${_TARGETS}"
      - "BASE_REF=${_BASE_REF}"
    args:
      - -c
      - |
        set -e
        # Cloud Build's default checkout is shallow; unshallow so HEAD~1 exists.
        # $$VAR escapes Cloud Build substitution so bash sees the env var.
        if [[ "$${TARGETS}" != "all" ]] && [[ "$${TARGETS}" != "" ]] && [[ "$${TARGETS}" != "auto" ]]; then
          :
        else
          git fetch --unshallow --no-tags 2>/dev/null \
            || git fetch --depth=50 --no-tags origin "$${BASE_REF#origin/}" 2>/dev/null \
            || true
        fi
        pip install --quiet pyyaml
        python scripts/cloudbuild_detect_targets.py
        echo "---"
        echo "targets file:"
        cat targets || true
    waitFor: ["-"]

  # ---------------------------------------------------------------------------
  # Pull cached :latest tags in parallel — only for images we'll actually
  # rebuild. Failure is fine (cold-cache first build).
  # ---------------------------------------------------------------------------
  - id: pull-cache-downloader
    name: gcr.io/cloud-builders/docker
    entrypoint: bash
    args:
      - -c
      - |
        grep -qx downloader targets || { echo "skip"; exit 0; }
        docker pull ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/monsoon-downloader:latest || true
    waitFor: [detect-targets]

  - id: pull-cache-pipeline-state
    name: gcr.io/cloud-builders/docker
    entrypoint: bash
    args:
      - -c
      - |
        grep -qx pipeline-state targets || { echo "skip"; exit 0; }
        docker pull ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/monsoon-pipeline-state:latest || true
    waitFor: [detect-targets]

  - id: pull-cache-tpu-dispatch
    name: gcr.io/cloud-builders/docker
    entrypoint: bash
    args:
      - -c
      - |
        grep -qx tpu-dispatch targets || { echo "skip"; exit 0; }
        docker pull ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/monsoon-tpu-dispatch:latest || true
    waitFor: [detect-targets]

  - id: pull-cache-sync
    name: gcr.io/cloud-builders/docker
    entrypoint: bash
    args:
      - -c
      - |
        grep -qx sync targets || { echo "skip"; exit 0; }
        docker pull ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/monsoon-sync:latest || true
    waitFor: [detect-targets]

  - id: pull-cache-blend
    name: gcr.io/cloud-builders/docker
    entrypoint: bash
    args:
      - -c
      - |
        grep -qx blend targets || { echo "skip"; exit 0; }
        docker pull ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/monsoon-blend:latest || true
    waitFor: [detect-targets]

  - id: pull-cache-postprocess
    name: gcr.io/cloud-builders/docker
    entrypoint: bash
    args:
      - -c
      - |
        grep -qx postprocess targets || { echo "skip"; exit 0; }
        docker pull ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/monsoon-postprocess:latest || true
    waitFor: [detect-targets]

  - id: pull-cache-aifs
    name: gcr.io/cloud-builders/docker
    entrypoint: bash
    args:
      - -c
      - |
        grep -qx aifs targets || { echo "skip"; exit 0; }
        docker pull ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/monsoon-aifs:latest || true
    waitFor: [detect-targets]

  - id: pull-cache-neuralgcm
    name: gcr.io/cloud-builders/docker
    entrypoint: bash
    args:
      - -c
      - |
        grep -qx neuralgcm targets || { echo "skip"; exit 0; }
        docker pull ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/monsoon-neuralgcm:latest || true
    waitFor: [detect-targets]

  - id: pull-cache-gencast
    name: gcr.io/cloud-builders/docker
    entrypoint: bash
    args:
      - -c
      - |
        grep -qx gencast targets || { echo "skip"; exit 0; }
        docker pull ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/monsoon-gencast:latest || true
    waitFor: [detect-targets]

  # ---------------------------------------------------------------------------
  # Build (gated). All builds use the repo root as context so Dockerfiles can
  # COPY from sibling directories (AIFS/, NeuralGCM/, blend/, sync/, etc.).
  # ---------------------------------------------------------------------------
  - id: build-downloader
    name: gcr.io/cloud-builders/docker
    entrypoint: bash
    env: ["DOCKER_BUILDKIT=1"]
    args:
      - -c
      - |
        grep -qx downloader targets || { echo "skip"; exit 0; }
        docker build \
          --cache-from ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/monsoon-downloader:latest \
          --build-arg BUILDKIT_INLINE_CACHE=1 \
          -t ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/monsoon-downloader:${_SHORT_SHA} \
          -t ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/monsoon-downloader:latest \
          -f docker/downloader/Dockerfile .
    waitFor: [pull-cache-downloader]

  - id: build-pipeline-state
    name: gcr.io/cloud-builders/docker
    entrypoint: bash
    env: ["DOCKER_BUILDKIT=1"]
    args:
      - -c
      - |
        grep -qx pipeline-state targets || { echo "skip"; exit 0; }
        docker build \
          --cache-from ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/monsoon-pipeline-state:latest \
          --build-arg BUILDKIT_INLINE_CACHE=1 \
          -t ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/monsoon-pipeline-state:${_SHORT_SHA} \
          -t ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/monsoon-pipeline-state:latest \
          -f docker/pipeline-state/Dockerfile .
    waitFor: [pull-cache-pipeline-state]

  - id: build-tpu-dispatch
    name: gcr.io/cloud-builders/docker
    entrypoint: bash
    env: ["DOCKER_BUILDKIT=1"]
    args:
      - -c
      - |
        grep -qx tpu-dispatch targets || { echo "skip"; exit 0; }
        docker build \
          --cache-from ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/monsoon-tpu-dispatch:latest \
          --build-arg BUILDKIT_INLINE_CACHE=1 \
          -t ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/monsoon-tpu-dispatch:${_SHORT_SHA} \
          -t ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/monsoon-tpu-dispatch:latest \
          -f docker/tpu-dispatch/Dockerfile .
    waitFor: [pull-cache-tpu-dispatch]

  - id: build-sync
    name: gcr.io/cloud-builders/docker
    entrypoint: bash
    env: ["DOCKER_BUILDKIT=1"]
    args:
      - -c
      - |
        grep -qx sync targets || { echo "skip"; exit 0; }
        docker build \
          --cache-from ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/monsoon-sync:latest \
          --build-arg BUILDKIT_INLINE_CACHE=1 \
          -t ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/monsoon-sync:${_SHORT_SHA} \
          -t ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/monsoon-sync:latest \
          -f docker/sync/Dockerfile .
    waitFor: [pull-cache-sync]

  - id: build-blend
    name: gcr.io/cloud-builders/docker
    entrypoint: bash
    env: ["DOCKER_BUILDKIT=1"]
    args:
      - -c
      - |
        grep -qx blend targets || { echo "skip"; exit 0; }
        docker build \
          --cache-from ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/monsoon-blend:latest \
          --build-arg BUILDKIT_INLINE_CACHE=1 \
          -t ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/monsoon-blend:${_SHORT_SHA} \
          -t ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/monsoon-blend:latest \
          -f docker/blend/Dockerfile .
    waitFor: [pull-cache-blend]

  - id: build-postprocess
    name: gcr.io/cloud-builders/docker
    entrypoint: bash
    env: ["DOCKER_BUILDKIT=1"]
    args:
      - -c
      - |
        grep -qx postprocess targets || { echo "skip"; exit 0; }
        docker build \
          --cache-from ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/monsoon-postprocess:latest \
          --build-arg BUILDKIT_INLINE_CACHE=1 \
          -t ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/monsoon-postprocess:${_SHORT_SHA} \
          -t ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/monsoon-postprocess:latest \
          -f docker/postprocess/Dockerfile .
    waitFor: [pull-cache-postprocess]

  - id: build-aifs
    name: gcr.io/cloud-builders/docker
    entrypoint: bash
    env: ["DOCKER_BUILDKIT=1"]
    args:
      - -c
      - |
        grep -qx aifs targets || { echo "skip"; exit 0; }
        docker build \
          --cache-from ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/monsoon-aifs:latest \
          --build-arg BUILDKIT_INLINE_CACHE=1 \
          -t ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/monsoon-aifs:${_SHORT_SHA} \
          -t ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/monsoon-aifs:latest \
          -f docker/aifs/Dockerfile .
    waitFor: [pull-cache-aifs]

  - id: build-neuralgcm
    name: gcr.io/cloud-builders/docker
    entrypoint: bash
    env: ["DOCKER_BUILDKIT=1"]
    args:
      - -c
      - |
        grep -qx neuralgcm targets || { echo "skip"; exit 0; }
        docker build \
          --cache-from ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/monsoon-neuralgcm:latest \
          --build-arg BUILDKIT_INLINE_CACHE=1 \
          -t ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/monsoon-neuralgcm:${_SHORT_SHA} \
          -t ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/monsoon-neuralgcm:latest \
          -f docker/neuralgcm/Dockerfile .
    waitFor: [pull-cache-neuralgcm]

  - id: build-gencast
    name: gcr.io/cloud-builders/docker
    entrypoint: bash
    env: ["DOCKER_BUILDKIT=1"]
    args:
      - -c
      - |
        grep -qx gencast targets || { echo "skip"; exit 0; }
        docker build \
          --cache-from ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/monsoon-gencast:latest \
          --build-arg BUILDKIT_INLINE_CACHE=1 \
          -t ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/monsoon-gencast:${_SHORT_SHA} \
          -t ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/monsoon-gencast:latest \
          -f docker/gencast/Dockerfile .
    waitFor: [pull-cache-gencast]

  # ---------------------------------------------------------------------------
  # Push (gated). Per-image push avoids the top-level `images:` block, which
  # would otherwise fail when an image wasn't built in this run.
  # ---------------------------------------------------------------------------
  - id: push-downloader
    name: gcr.io/cloud-builders/docker
    entrypoint: bash
    args:
      - -c
      - |
        grep -qx downloader targets || { echo "skip"; exit 0; }
        docker push --all-tags ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/monsoon-downloader
    waitFor: [build-downloader]

  - id: push-pipeline-state
    name: gcr.io/cloud-builders/docker
    entrypoint: bash
    args:
      - -c
      - |
        grep -qx pipeline-state targets || { echo "skip"; exit 0; }
        docker push --all-tags ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/monsoon-pipeline-state
    waitFor: [build-pipeline-state]

  - id: push-tpu-dispatch
    name: gcr.io/cloud-builders/docker
    entrypoint: bash
    args:
      - -c
      - |
        grep -qx tpu-dispatch targets || { echo "skip"; exit 0; }
        docker push --all-tags ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/monsoon-tpu-dispatch
    waitFor: [build-tpu-dispatch]

  - id: push-sync
    name: gcr.io/cloud-builders/docker
    entrypoint: bash
    args:
      - -c
      - |
        grep -qx sync targets || { echo "skip"; exit 0; }
        docker push --all-tags ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/monsoon-sync
    waitFor: [build-sync]

  - id: push-blend
    name: gcr.io/cloud-builders/docker
    entrypoint: bash
    args:
      - -c
      - |
        grep -qx blend targets || { echo "skip"; exit 0; }
        docker push --all-tags ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/monsoon-blend
    waitFor: [build-blend]

  - id: push-postprocess
    name: gcr.io/cloud-builders/docker
    entrypoint: bash
    args:
      - -c
      - |
        grep -qx postprocess targets || { echo "skip"; exit 0; }
        docker push --all-tags ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/monsoon-postprocess
    waitFor: [build-postprocess]

  - id: push-aifs
    name: gcr.io/cloud-builders/docker
    entrypoint: bash
    args:
      - -c
      - |
        grep -qx aifs targets || { echo "skip"; exit 0; }
        docker push --all-tags ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/monsoon-aifs
    waitFor: [build-aifs]

  - id: push-neuralgcm
    name: gcr.io/cloud-builders/docker
    entrypoint: bash
    args:
      - -c
      - |
        grep -qx neuralgcm targets || { echo "skip"; exit 0; }
        docker push --all-tags ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/monsoon-neuralgcm
    waitFor: [build-neuralgcm]

  - id: push-gencast
    name: gcr.io/cloud-builders/docker
    entrypoint: bash
    args:
      - -c
      - |
        grep -qx gencast targets || { echo "skip"; exit 0; }
        docker push --all-tags ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/monsoon-gencast
    waitFor: [build-gencast]

  # ---------------------------------------------------------------------------
  # Roll Cloud Run service/jobs to the freshly-pushed digest. Cloud Run pins
  # the resolved digest at revision-create time and does not auto-follow tag
  # movement on :latest, so explicit updates are required to deploy changes.
  #
  # Batch (aifs, neuralgcm) and TPU workload (gencast) tasks resolve :latest at
  # submit time. Cloud Run jobs, including tpu-dispatch, need explicit updates.
  # ---------------------------------------------------------------------------
  - id: deploy-pipeline-state
    name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: bash
    args:
      - -c
      - |
        grep -qx pipeline-state targets || { echo "skip"; exit 0; }
        gcloud run services update monsoon-${_ENV}-pipeline-state \
          --project=${PROJECT_ID} --region=${_REGION} \
          --image=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/monsoon-pipeline-state:${_SHORT_SHA}
    waitFor: [push-pipeline-state]

  - id: deploy-downloader
    name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: bash
    args:
      - -c
      - |
        grep -qx downloader targets || { echo "skip"; exit 0; }
        gcloud run jobs update monsoon-${_ENV}-downloader \
          --project=${PROJECT_ID} --region=${_REGION} \
          --image=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/monsoon-downloader:${_SHORT_SHA}
    waitFor: [push-downloader]

  - id: deploy-tpu-dispatch
    name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: bash
    args:
      - -c
      - |
        grep -qx tpu-dispatch targets || { echo "skip"; exit 0; }
        gcloud run jobs update monsoon-${_ENV}-tpu-dispatch \
          --project=${PROJECT_ID} --region=${_REGION} \
          --image=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/monsoon-tpu-dispatch:${_SHORT_SHA}
    waitFor: [push-tpu-dispatch]

  - id: deploy-sync
    name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: bash
    args:
      - -c
      - |
        grep -qx sync targets || { echo "skip"; exit 0; }
        gcloud run jobs update monsoon-${_ENV}-sync \
          --project=${PROJECT_ID} --region=${_REGION} \
          --image=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/monsoon-sync:${_SHORT_SHA}
    waitFor: [push-sync]

  - id: deploy-blend
    name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: bash
    args:
      - -c
      - |
        grep -qx blend targets || { echo "skip"; exit 0; }
        gcloud run jobs update monsoon-${_ENV}-blend \
          --project=${PROJECT_ID} --region=${_REGION} \
          --image=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/monsoon-blend:${_SHORT_SHA}
    waitFor: [push-blend]

  - id: deploy-postprocess
    name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: bash
    args:
      - -c
      - |
        grep -qx postprocess targets || { echo "skip"; exit 0; }
        gcloud run jobs update monsoon-${_ENV}-postprocess \
          --project=${PROJECT_ID} --region=${_REGION} \
          --image=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/monsoon-postprocess:${_SHORT_SHA}
    waitFor: [push-postprocess]

timeout: 3600s
