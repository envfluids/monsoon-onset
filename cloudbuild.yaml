# -----------------------------------------------------------------------------
# Cloud Build Configuration
# Builds and pushes Docker images to Artifact Registry
# -----------------------------------------------------------------------------
#
# Trigger this build with:
#   gcloud builds submit --config cloudbuild.yaml \
#     --substitutions=_ENV=dev,_REGION=us-central1
#
# Or set up a trigger in Cloud Build for automatic builds on push
# -----------------------------------------------------------------------------

substitutions:
  _REGION: us-central1
  _REPO: monsoon-dev-containers
  _SHORT_SHA: local

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8

steps:
  # -----------------------------------------------------------------------------
  # Build lightweight images in parallel
  # -----------------------------------------------------------------------------

  # All builds use the repo root as context so Dockerfiles can COPY from
  # sibling directories (AIFS/, NeuralGCM/, blend/, sync/ etc.)

  - id: pull-cache-downloader
    name: gcr.io/cloud-builders/docker
    entrypoint: bash
    args:
      - -c
      - docker pull ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/monsoon-downloader:latest || true
    waitFor: ["-"]

  - id: pull-cache-pipeline-state
    name: gcr.io/cloud-builders/docker
    entrypoint: bash
    args:
      - -c
      - docker pull ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/monsoon-pipeline-state:latest || true
    waitFor: ["-"]

  - id: pull-cache-sync
    name: gcr.io/cloud-builders/docker
    entrypoint: bash
    args:
      - -c
      - docker pull ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/monsoon-sync:latest || true
    waitFor: ["-"]

  - id: pull-cache-blend
    name: gcr.io/cloud-builders/docker
    entrypoint: bash
    args:
      - -c
      - docker pull ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/monsoon-blend:latest || true
    waitFor: ["-"]

  - id: pull-cache-postprocess
    name: gcr.io/cloud-builders/docker
    entrypoint: bash
    args:
      - -c
      - docker pull ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/monsoon-postprocess:latest || true
    waitFor: ["-"]

  - id: pull-cache-aifs
    name: gcr.io/cloud-builders/docker
    entrypoint: bash
    args:
      - -c
      - docker pull ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/monsoon-aifs:latest || true
    waitFor: ["-"]

  - id: pull-cache-neuralgcm
    name: gcr.io/cloud-builders/docker
    entrypoint: bash
    args:
      - -c
      - docker pull ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/monsoon-neuralgcm:latest || true
    waitFor: ["-"]

  - id: build-downloader
    name: gcr.io/cloud-builders/docker
    env: ["DOCKER_BUILDKIT=1"]
    args:
      - build
      - --cache-from
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/monsoon-downloader:latest
      - --build-arg
      - BUILDKIT_INLINE_CACHE=1
      - -t
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/monsoon-downloader:${_SHORT_SHA}
      - -t
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/monsoon-downloader:latest
      - -f
      - docker/downloader/Dockerfile
      - .
    waitFor: [pull-cache-downloader]

  - id: build-pipeline-state
    name: gcr.io/cloud-builders/docker
    env: ["DOCKER_BUILDKIT=1"]
    args:
      - build
      - --cache-from
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/monsoon-pipeline-state:latest
      - --build-arg
      - BUILDKIT_INLINE_CACHE=1
      - -t
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/monsoon-pipeline-state:${_SHORT_SHA}
      - -t
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/monsoon-pipeline-state:latest
      - -f
      - docker/pipeline-state/Dockerfile
      - .
    waitFor: [pull-cache-pipeline-state]

  - id: build-sync
    name: gcr.io/cloud-builders/docker
    env: ["DOCKER_BUILDKIT=1"]
    args:
      - build
      - --cache-from
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/monsoon-sync:latest
      - --build-arg
      - BUILDKIT_INLINE_CACHE=1
      - -t
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/monsoon-sync:${_SHORT_SHA}
      - -t
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/monsoon-sync:latest
      - -f
      - docker/sync/Dockerfile
      - .
    waitFor: [pull-cache-sync]

  - id: build-blend
    name: gcr.io/cloud-builders/docker
    env: ["DOCKER_BUILDKIT=1"]
    args:
      - build
      - --cache-from
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/monsoon-blend:latest
      - --build-arg
      - BUILDKIT_INLINE_CACHE=1
      - -t
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/monsoon-blend:${_SHORT_SHA}
      - -t
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/monsoon-blend:latest
      - -f
      - docker/blend/Dockerfile
      - .
    waitFor: [pull-cache-blend]

  - id: build-postprocess
    name: gcr.io/cloud-builders/docker
    env: ["DOCKER_BUILDKIT=1"]
    args:
      - build
      - --cache-from
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/monsoon-postprocess:latest
      - --build-arg
      - BUILDKIT_INLINE_CACHE=1
      - -t
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/monsoon-postprocess:${_SHORT_SHA}
      - -t
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/monsoon-postprocess:latest
      - -f
      - docker/postprocess/Dockerfile
      - .
    waitFor: [pull-cache-postprocess]

  # -----------------------------------------------------------------------------
  # Build GPU images (heavier, but can run in parallel)
  # -----------------------------------------------------------------------------

  - id: build-aifs
    name: gcr.io/cloud-builders/docker
    env: ["DOCKER_BUILDKIT=1"]
    args:
      - build
      - --cache-from
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/monsoon-aifs:latest
      - --build-arg
      - BUILDKIT_INLINE_CACHE=1
      - -t
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/monsoon-aifs:${_SHORT_SHA}
      - -t
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/monsoon-aifs:latest
      - -f
      - docker/aifs/Dockerfile
      - .
    waitFor: [pull-cache-aifs]

  - id: build-neuralgcm
    name: gcr.io/cloud-builders/docker
    env: ["DOCKER_BUILDKIT=1"]
    args:
      - build
      - --cache-from
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/monsoon-neuralgcm:latest
      - --build-arg
      - BUILDKIT_INLINE_CACHE=1
      - -t
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/monsoon-neuralgcm:${_SHORT_SHA}
      - -t
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/monsoon-neuralgcm:latest
      - -f
      - docker/neuralgcm/Dockerfile
      - .
    waitFor: [pull-cache-neuralgcm]

  # -----------------------------------------------------------------------------
  # Push all images
  # -----------------------------------------------------------------------------

  - id: push-downloader
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - --all-tags
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/monsoon-downloader
    waitFor: [build-downloader]

  - id: push-pipeline-state
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - --all-tags
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/monsoon-pipeline-state
    waitFor: [build-pipeline-state]

  - id: push-sync
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - --all-tags
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/monsoon-sync
    waitFor: [build-sync]

  - id: push-blend
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - --all-tags
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/monsoon-blend
    waitFor: [build-blend]

  - id: push-postprocess
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - --all-tags
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/monsoon-postprocess
    waitFor: [build-postprocess]

  - id: push-aifs
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - --all-tags
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/monsoon-aifs
    waitFor: [build-aifs]

  - id: push-neuralgcm
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - --all-tags
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/monsoon-neuralgcm
    waitFor: [build-neuralgcm]

images:
  - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/monsoon-downloader:${_SHORT_SHA}
  - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/monsoon-downloader:latest
  - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/monsoon-pipeline-state:${_SHORT_SHA}
  - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/monsoon-pipeline-state:latest
  - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/monsoon-sync:${_SHORT_SHA}
  - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/monsoon-sync:latest
  - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/monsoon-blend:${_SHORT_SHA}
  - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/monsoon-blend:latest
  - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/monsoon-postprocess:${_SHORT_SHA}
  - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/monsoon-postprocess:latest
  - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/monsoon-aifs:${_SHORT_SHA}
  - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/monsoon-aifs:latest
  - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/monsoon-neuralgcm:${_SHORT_SHA}
  - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/monsoon-neuralgcm:latest

timeout: 3600s  # 1 hour max
